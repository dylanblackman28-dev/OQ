name: OQ Roast Plan Weekly Sync

on:
  schedule:
    # Mon & Tue every 30 min, 6:00am-1:00pm AEST (order-heavy window):
    # Mon/Tue 6:00-9:30am AEST = Sun/Mon 20:00-23:30 UTC
    - cron: '*/30 20-23 * * 0,1'
    # Mon/Tue 10:00am-12:30pm AEST = Mon/Tue 00:00-02:30 UTC
    - cron: '*/30 0-2 * * 1,2'
    # Mon/Tue 1:00pm AEST = Mon/Tue 03:00 UTC
    - cron: '0 3 * * 1,2'
    # Wednesday 6:30am AEST = Tuesday 20:30 UTC
    - cron: '30 20 * * 2'
    # Friday 6:30am AEST = Thursday 20:30 UTC
    - cron: '30 20 * * 4'
  workflow_dispatch:
    inputs:
      backfill_weeks:
        description: 'Extra past weeks to re-sync (0 = normal run)'
        required: false
        default: '0'
      backfill_offset:
        description: 'Skip this many recent weeks (for chunked backfills)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase requests

      - name: Run roast sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OM_USERNAME: ${{ secrets.OM_USERNAME }}
          OM_PASSWORD: ${{ secrets.OM_PASSWORD }}
          BACKFILL_WEEKS: ${{ inputs.backfill_weeks || '0' }}
          BACKFILL_OFFSET: ${{ inputs.backfill_offset || '0' }}
        run: python scripts/roast_sync.py
