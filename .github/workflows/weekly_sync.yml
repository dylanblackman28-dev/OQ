name: OQ Wholesale Weekly Sync

on:
  schedule:
    # Monday 6:30am AEST = Sunday 20:30 UTC
    - cron: '30 20 * * 0'
    # Tuesday 6:30am AEST = Monday 20:30 UTC
    - cron: '30 20 * * 1'
    # Tuesday 12:15pm AEST = Tuesday 02:15 UTC
    - cron: '15 2 * * 2'
    # Tuesday 12:45pm AEST = Tuesday 02:45 UTC (backup)
    - cron: '45 2 * * 2'
    # Wednesday 6:30am AEST = Tuesday 20:30 UTC
    - cron: '30 20 * * 2'
    # Friday 6:30am AEST = Thursday 20:30 UTC
    - cron: '30 20 * * 4'
  workflow_dispatch:
    inputs:
      backfill_weeks:
        description: 'Extra past weeks to re-sync (0 = just latest week)'
        required: false
        default: '0'
      backfill_offset:
        description: 'Skip this many recent weeks (for chunked backfills)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase requests

      - name: Run wholesale sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OM_USERNAME: ${{ secrets.OM_USERNAME }}
          OM_PASSWORD: ${{ secrets.OM_PASSWORD }}
          BACKFILL_WEEKS: ${{ inputs.backfill_weeks || '0' }}
          BACKFILL_OFFSET: ${{ inputs.backfill_offset || '0' }}
        run: python scripts/wholesale_sync.py
