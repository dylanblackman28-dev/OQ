name: Cold Brew Probe (read-only)

on:
  workflow_dispatch:
    inputs:
      probe_weeks:
        description: 'How many recent weeks to scan (incl. current)'
        required: false
        default: '4'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run probe
        env:
          OM_USERNAME: ${{ secrets.OM_USERNAME }}
          OM_PASSWORD: ${{ secrets.OM_PASSWORD }}
          PROBE_WEEKS: ${{ inputs.probe_weeks || '4' }}
        run: python scripts/cold_brew_probe.py
